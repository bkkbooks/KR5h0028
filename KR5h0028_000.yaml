body:
  text: 上清金章十二篇宴盻太霞宫金闕曜紫清仙房宴太素四軒皆朱瓊擲輪空洞律控轡舞緣軿玉華飛雲蓋四妃運錦旌翻然塵濁外鯈歘佳人庭宿感應期來所得已在冥乘風想九霄共酣丹華安顧謝世中物安知無中靈北登玄𡨋闕𢹂手經髙羅香烟散八景玄風鼓絳波仰超琅琅津俯眄曲嶽阿嘯歌雲上唱鳳鳴九洞霞乘氣浮太空曷為躡山阿金節命羽靈徴兵摧萬魔漱汲圎晨暉積春方嬰牙紛紛趣競中不解可奈何北龍鬱霄藹絳𣗳結紫華青蘂落鳳林碧㮏秀巖阿靈閣陵太霞瓊房參太霞雲興曲室內八風飛𡨋沙九彌彈帝墉龍嘯唱節和扇飊五嶽嶺握節徴萬顧盻須㬰頃忽然椿已過哀哉朝生者安和齡紀多隅景希宫運軸冲漠幽至觀映六庭大小盡逍遙龍吹纒蓋雲虎吟駭萬條三素啓髙圖丹霞蔚晨霄羽旗橫靈津紫軿飛華翹控轡九天外俯仰自寥寥塵誅結囂穢神喪氣亦凋奚不尋逺御八千乃一朝朝濟碧海波飛輪辭緣房髙唱儔友篇蓋越滄浪中三契玉霄賔五期東華童羽飊升帝晨宴此廣寒宫八音虛中彈紫鳳唱靈風絳霞遏明曜八景飛太空咀嚼瓊泉津浩秀還嬰蒙至樂歸五神年積劫刃崇脫屣將何難勞憂喪天冲朝駕晨景暉逸轡發紫清浮雲騁太霞揚蓋廣寒庭髙真禁帝室宫墉引西靈十絶五空洞飛烟繞錦屏虎扇神風慶紫雲回龍軿倐歘窮八方一顧椿已頃簫遙玄競子奚不尋太生神圃秀𨼆芝昆池灌眄田仰觀玉清闕嵳峩臨絳津紫霞映曲席五雲曜九玄八風起絶宇幽藹緣軒間三元舍西宫東華有隹人北𡨋唱七嘯明姬歌南真撫璈參朱津玉節揚六絃合契安非運俱嚮廣鳳巔同期命萬魔宅此群黑千超然來何難乃啓不窮年駕氣眄空洞乘景訴九天動鬱廣暉羽玄蓋生旡間八烟飊寥輪軌滯不許年撫璈八空響我馬亦無津握節入東華夕宴玄圃巔束帶携五靈解襟翹良人𡨋感自適運泛然亦有緣俱載陵厲翮一扇動億千降景浮玄景紫軒乘雲征仰超金闕內俯眄西華成東華啓五暉神光煥七靈翳映三汜燭流任自齊𡨋風鼓空洞宇香烟散玉庭手𢹂織女儛雙襟落錦青元徊交羽旗華蓋隨雲傾宴寢九度外是非不我營抱空汍丸內天姿愈日嬰豈況洞愆穢中慘無𦕅生扶桑翠空峯朱雲葩微明浪臺宥虛上四觀映髙清飛景控紫輪三素轡丹軿寢偃太帝館崚𡾓何母庭濯足碧瀨波提契玉醴罌曲晨乘風扇飄飄時下傾暫適地藹中回駕汜良真玄㑹自相要流浪任幽𡨋始知榮辱幸方悟憂促齡曲室可清靜願神待日成何為講當𡍼百痾從是生天庭生金華內以彰隂邪玉谷參玄卿瓊氣互扶羅天真立遐日飛蘂吐靈沙清晨案天馬回駕神玄家仙人來入室又以滅百邪道以齊為先勤行登金闕故設大法橋普度諸人物宿世恩德報道心超然發六齊禮空洞十直神感徹五老刋仙名雲輿相迎謁身飛升玄都七祖咸解脫上清金章終
