body:
  text: 上清金章十二篇宴盻太霞宫金闕曜紫清仙房宴太素四軒皆朱瓊擲輪空洞律控轡舞縁軿玉華飛雲盖四妃運錦旌翻然塵濁外鯈歘佳人庭宿感應期来所得已在冥乗風想九霄共酣丹華安顧謝世中物安知無中靈北登玄𡨋闕𢹂手經髙羅香烟散八景玄風鼓絳波仰超琅琅津俯眄曲嶽阿嘯歌雲上唱鳳鳴九洞霞乗炁浮太空曷為躡山阿金節命羽靈徴兵摧萬魔漱汲圎晨暉積春方嬰牙紛紛趣競中不觧可柰何北龍欝霄藹絳𣗳結紫華青蘂落鳳林碧㮏秀巖阿靈閣陵太霞瓊房參太霞雲興曲室内八風飛𡨋沙九彌弹帝墉龍嘯唱節和扇飊五嶽嶺握節徴萬顧盻須㬰頃忽然椿已過哀㢤朝生者安和齡紀多隅景希宫運軸冲漠幽至觀映六庭大小盡逍遥龍吹纒盖雲虎吟駭萬條三素啓髙圖丹霞蔚晨霄羽旂横靈津紫軿飛華翹控轡九天外俯仰自寥寥塵誅結囂穢神䘮炁亦凋奚不尋逺御八千乃一朝朝濟碧海波飛輪辭縁房髙唱儔友篇盖越滄浪中三契玉霄賔五期東華童羽飊昇帝晨宴此廣寒宫八音虚中弹紫鳳唱靈風絳霞遏明曜八景飛太空咀嚼瓊泉津浩秀還嬰蒙至樂歸五神年積刼刃崇脫屣將何難勞憂䘮天冲朝駕晨景暉逸轡發紫清浮雲騁太霞揚盖廣寒庭髙真禁帝室宫墉引西靈十絶五空洞飛烟繞錦屏虎扇神風慶紫雲迴龍軿倐歘窮八方一顧椿已頃簫遥玄競子奚不㝷太生神圃秀𨼆芝昆池灌眄田仰觀玉清闕嵳峩臨絳津紫霞映曲席五雲曜九玄八風起絶宇幽藹縁軒間三元舎西宫東華有隹人北𡨋唱七嘯明姬歌南真撫璈參朱津玉節揚六絃合契安非運俱嚮廣鳳巔同期命萬魔宅此群黒千超然来何難乃啓不窮年駕炁眄空洞乗景愬九天動欝廣暉羽玄盖生旡間八烟飊寥輪軌滯不許年撫璈八空響我馬亦無津握節入東華夕宴玄圃巔束帶携五靈觧衿翹良人𡨋感自適運汎然亦有縁俱載陵厲翮一扇動億千降景浮玄景紫軒乗雲征仰超金闕内俯眄西華成東華啓五暉神光煥七靈翳映三汜燭流任自齊𡨋風鼓空洞宇香烟散玉庭手𢹂織女儛雙衿落錦青元徊交羽旗華盖随雲傾宴寝九度外是非不我營抱空汍丸内天姿愈日嬰豈況洞愆穢中惨無𦕅生扶桑翠空峯朱雲葩㣲明浪䑓宥虚上四觀映髙清飛景控紫輪三素轡丹軿寢偃太帝舘崚𡾓何母庭濯足碧瀬波提契玉醴甖曲晨乗風扇飄飄時下傾暫適地藹中廻駕汜良真玄㑹自相要流浪任幽𡨋始知榮辱幸方悟憂促齡曲室可清靜願神待日成何為講當𡍼百痾從是生天庭生金華内以彰隂邪玉谷參玄卿瓊炁互扶羅天真立遐日飛蘂吐靈沙清晨案天馬廻駕神玄家仙人来入室又以㓕百邪道以齋為先勤行登金闕故設大法橋普度諸人物宿世恩徳報道心超然發六齋禮空洞十直神感徹五老刋仙名雲輿相迎謁身飛昇玄都七祖咸觧脫上清金章終
